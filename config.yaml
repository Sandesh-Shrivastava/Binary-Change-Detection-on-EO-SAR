# GalaxEye EO-SAR Change Detection Config

data:
  train_dir: "Data/train"
  val_dir: "Data/val"
  test_dir: "Data/test"
  batch_size: 8
  img_size: 512
  val_scenes: ["scene_07"] # Scene-aware split
  augmentations: "HorizontalFlip, VerticalFlip, RandomRotate90, RandomBrightnessContrast"

model:
  architecture: "unet"
  encoder: "resnet34"
  in_channels: 4
  num_classes: 1

training:
  epochs: 50
  lr: 0.0001
  optimizer: "AdamW"
  loss_type: "hybrid"
  seed: 42
  device: "mps" # Use 'mps' for Apple Silicon, 'cuda' for NVIDIA, 'cpu' otherwise

output:
  checkpoint_dir: "checkpoints"
  results_dir: "outputs"
